name: '[CI] Proto Tools'

on:
    push:
        paths:
        - '.github/workflows/ci.yml'
        - 'src/**'
        - 'tests/**'
        - 'Cargo.toml'
    pull_request:
        paths:
        - '.github/workflows/ci.yml'
        - 'src/**'
        - 'tests/**'
        - 'Cargo.toml'

jobs:
    run-format:
        runs-on: ubuntu-24.04

        steps:
        - name: Checkout Repository
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

        - name: Setup Rust
          uses: moonrepo/setup-rust@abb2d32350334249b178c401e5ec5836e0cd88d3 # v1.3.0
          with:
              channel: '1.90.0'
              components: rustfmt
              cache: true

        - name: Run Format
          run: cargo fmt --all --check

    run-lint:
        runs-on: ubuntu-24.04

        steps:
        - name: Checkout Repository
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

        - name: Setup Rust
          uses: moonrepo/setup-rust@abb2d32350334249b178c401e5ec5836e0cd88d3 # v1.3.0
          with:
              channel: '1.90.0'
              components: clippy
              cache: true

        - name: Run Lint
          run: cargo clippy --workspace --all-targets

    run-test:
        runs-on: ${{ matrix.os }}

        strategy:
            matrix:
                os: [ubuntu-24.04, windows-2025, macos-15]
            fail-fast: false

        steps:
        - name: Checkout Repository
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

        - name: Setup Rust
          uses: moonrepo/setup-rust@abb2d32350334249b178c401e5ec5836e0cd88d3 # v1.3.0
          with:
              channel: '1.90.0'
              targets: wasm32-wasip1
              bins: cargo-nextest
              cache: false
          env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        - name: Setup Toolchain
          uses: moonrepo/setup-toolchain@261c62cb5b0f580c7be7c8cd0f023a2e96756095 # v0.6.4

        - name: Build Proto Plugin
          uses: moonrepo/build-proto-plugin@c446bcf166358a243559500352935eefbd58dd79 # v0.5.4

        - name: Run Test
          run: cargo nextest run --no-default-features

    run-build:
        needs: [run-format, run-lint, run-test]

        runs-on: ${{ matrix.os }}

        strategy:
            matrix:
                os: [ubuntu-24.04, windows-2025, macos-15]
            fail-fast: false

        steps:
        - name: Checkout Repository
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

        - name: Setup Rust
          uses: moonrepo/setup-rust@abb2d32350334249b178c401e5ec5836e0cd88d3 # v1.3.0
          with:
              targets: wasm32-wasip1
              channel: '1.90.0'
              cache: true
          env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        - name: Build WASM Plugin
          run: cargo build --target wasm32-wasip1

        - name: Verify Build Output
          shell: bash
          run: |
              echo "Checking for WASM files..."
              ls -la target/wasm32-wasip1/debug/ || echo "Debug directory not found"
              find target -name "*.wasm" -type f || echo "No WASM files found"

        - name: Upload Plugin Artifact
          uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
          with:
              name: plugin-${{ matrix.os }}
              path: target/wasm32-wasip1/debug/gcloud_plugin.wasm
              retention-days: 1
              if-no-files-found: error

    run-e2e:
        needs: [run-build, run-test]

        runs-on: ${{ matrix.os }}

        strategy:
            matrix:
                os: [ubuntu-24.04, windows-2025, macos-15]
            fail-fast: false

        steps:
        - name: Checkout Repository
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

        - name: Download Plugin Artifact
          uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
          with:
              name: plugin-${{ matrix.os }}
              path: target/wasm32-wasip1/debug/

        - name: Verify Downloaded Artifact
          shell: bash
          run: |
              echo "Checking downloaded files..."
              ls -la target/wasm32-wasip1/debug/ || echo "Debug directory not found"
              test -f target/wasm32-wasip1/debug/gcloud_plugin.wasm || (echo "gcloud_plugin.wasm not found" && exit 1)
              echo "Plugin file found successfully"

        - name: Setup Proto
          uses: moonrepo/setup-toolchain@261c62cb5b0f580c7be7c8cd0f023a2e96756095 # v0.6.4
          with:
              auto-install: true
              proto-version: '0.53.2'

        - name: Run E2E Tests
          run: proto install gcloud-test

        - name: Run Versions Test
          run: gcloud version

    run-approval:
        needs: [run-build, run-e2e]
        if: github.event_name == 'pull_request'

        runs-on: ubuntu-24.04

        steps:
        - name: Checkout Repository
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

        - name: Comment on PR when tests pass
          run: |
              comment_body="Tests passed! Please review."
              reviewers=$(echo '${{ toJson(github.event.pull_request.requested_reviewers.*.login) }}' | jq -r '.[]' 2>/dev/null || echo "")
              for reviewer in $reviewers; do
                comment_body+=" @$reviewer"
              done
              curl -X POST \
                -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                -d "{\"body\": \"$comment_body\"}" \
                "https://api.github.com/repos/$GH_REPO/issues/$NUMBER/comments"
          env:
              GH_TOKEN: ${{ secrets.PRE_GITHUB_TOKEN }}
              GH_REPO: ${{ github.repository }}
              NUMBER: ${{ github.event.pull_request.number }}
          if: success()
