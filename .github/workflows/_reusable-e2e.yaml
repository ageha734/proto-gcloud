name: "[Reusable] E2E"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  e2e:
    name: "E2E (${{ matrix.target }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-15
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: x86_64-pc-windows-msvc
            os: windows-2025

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: proto_gcloud.wasm

      - name: Setup proto
        uses: moonrepo/setup-toolchain@261c62cb5b0f580c7be7c8cd0f023a2e96756095 # v0.6.4
        with:
          auto-install: true

      - run: mkdir -p ~/.proto

      - name: Configure plugin
        run: |
          cat > ~/.proto/.prototools <<'PROTOEOF'
          [plugins]
          gcloud-test = "file://$(pwd)/proto_gcloud.wasm"
          PROTOEOF

      - name: Run E2E (${{ matrix.target }})
        run: proto install gcloud-test

      - name: Verify installation (${{ matrix.target }})
        run: proto run gcloud-test -- version
