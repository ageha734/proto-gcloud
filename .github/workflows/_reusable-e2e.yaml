name: "[Reusable] E2E"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  e2e:
    name: "E2E (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15]
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - id: toolchain
        run: echo "channel=$(sed -n 's/^channel = "\(.*\)"/\1/p' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build WASM plugin
        run: cargo build --target wasm32-wasip1 --release --features wasm

      - name: Setup proto
        uses: moonrepo/setup-toolchain@261c62cb5b0f580c7be7c8cd0f023a2e96756095 # v0.6.4
        with:
          auto-install: true

      - name: Configure plugin
        run: |
          mkdir -p ~/.proto
          cat > ~/.proto/.prototools <<'PROTOEOF'
          [plugins]
          gcloud-test = "file://TARGET_PATH/proto_gcloud.wasm"
          PROTOEOF
          sed -i'' -e "s|TARGET_PATH|$(pwd)/target/wasm32-wasip1/release|g" ~/.proto/.prototools

      - name: Run E2E - proto install
        run: proto install gcloud-test

      - name: Verify installation
        run: proto run gcloud-test -- version
